<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misión Naturaleza</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
    }

    header {
      background: #c5e8b7;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
    }

    section {
      padding: 40px 20px;
      text-align: center;
    }

    /* ===== CARRUSEL ===== */
    .carrusel {
      position: relative;
      max-width: 900px;
      margin: auto;
      overflow: hidden;
      border-radius: 15px;
    }

    .carrusel-contenedor {
      display: flex;
      transition: transform 0.5s ease;
    }

    .carrusel img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .prev, .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 15px;
      cursor: pointer;
      font-size: 25px;
    }

    .prev { left: 10px; }
    .next { right: 10px; }

    .prev:hover, .next:hover {
      background: rgba(0,0,0,0.8);
    }

    @media (max-width: 600px) {
      .carrusel img {
        height: 250px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>MISIÓN NATURALEZA</h1>
</header>

<section>
  <h2>Galería (Carrusel)</h2>

  <div class="carrusel">
    <button class="prev">&#10094;</button>

    <div class="carrusel-contenedor">
      <img src="laguna.jpg">
      <img src="logo-mision-naturaleza.png">
      <img src="ods14.jpg">
      <img src="ods15.jpg">
      <img src="playa.jpg">
      <img src="selva.jpg">
    </div>

    <button class="next">&#10095;</button>
  </div>
</section>

<script>
let index = 0;
const contenedor = document.querySelector(".carrusel-contenedor");
const total = document.querySelectorAll(".carrusel img").length;

document.querySelector(".next").onclick = () => {
  index = (index + 1) % total;
  actualizar();
};

document.querySelector(".prev").onclick = () => {
  index = (index - 1 + total) % total;
  actualizar();
};

function actualizar() {
  contenedor.style.transform = `translateX(-${index * 100}%)`;
}
</script>

</body>
</html>
